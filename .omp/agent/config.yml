providers: 
  webSearch: auto
symbolPreset: nerd
theme: 
  dark: dark-terminal-custom
statusLine: 
  preset: custom
  separator: pipe
  leftSegments: [model, mode, collab, path, git, pr, context_pct, cost]
  rightSegments: [session_name]
  segmentOptions: 
    model: 
      showThinkingLevel: true
    path: 
      abbreviate: true
      maxLength: 40
      stripWorkPrefix: true
    git: 
      showBranch: true
      showStaged: true
      showUnstaged: true
      showUntracked: true
setupVersion: 1
modelRoles: 
  default: anthropic/claude-opus-4-8:low
defaultThinkingLevel: auto
tools: 
  approvalMode: always-ask